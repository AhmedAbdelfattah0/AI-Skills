name: validate-skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Node validator is canonical and cross-platform (also runnable on Windows).
      - name: Run skill validator
        run: node scripts/cli.mjs validate
